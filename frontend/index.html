<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>ICU 质控管理平台</title>
<link rel="icon" href="data:," />
<link rel="stylesheet" href="css/style.css" />
<style>
  .welcome { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .welcome-left h2 { margin:0 0 6px; font-size:22px; color:#172033; }
  .welcome-left p { margin:0; color:#64748b; font-size:14px; }
  .welcome-right { text-align:right; }
  .welcome-right .datetime { font-size:15px; color:#475569; font-weight:600; }
  .welcome-right .admitted { margin-top:6px; font-size:13px; color:#64748b; }
  .welcome-right .admitted strong { color:#1769c2; font-size:20px; }

  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:18px; }
  .kpi-card { background:#fff; border:1px solid #e8edf5; border-radius:10px; padding:20px;
              cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .kpi-card:hover { box-shadow:0 8px 24px rgba(31,45,61,.12); transform:translateY(-2px); }
  .kpi-card .kpi-icon { width:40px; height:40px; border-radius:8px; display:flex;
                         align-items:center; justify-content:center; font-size:20px; margin-bottom:12px; }
  .kpi-card .kpi-label { font-size:13px; color:#64748b; margin-bottom:6px; }
  .kpi-card .kpi-value { font-size:32px; font-weight:700; color:#172033; line-height:1; }
  .kpi-card .kpi-trend { position:absolute; top:16px; right:16px; font-size:13px; font-weight:600; }
  .kpi-card .kpi-trend.up { color:#10b981; }
  .kpi-card .kpi-trend.down { color:#ef4444; }
  .kpi-card .kpi-unit { font-size:13px; color:#94a3b8; margin-top:4px; }

  .kpi-blue .kpi-icon { background:#e8f2ff; color:#1769c2; }
  .kpi-green .kpi-icon { background:#e6f9f1; color:#00b894; }
  .kpi-orange .kpi-icon { background:#fff7ed; color:#c2410c; }
  .kpi-purple .kpi-icon { background:#f3e8ff; color:#7c3aed; }

  .dashboard-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:18px; }

  .alert-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #edf1f7; }
  .alert-row:last-child { border-bottom:none; }
  .alert-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; flex-shrink:0; }
  .alert-info { flex:1; }
  .alert-info .alert-title { font-size:14px; color:#172033; font-weight:500; }
  .alert-info .alert-desc { font-size:12px; color:#94a3b8; margin-top:2px; }
  .alert-action { font-size:13px; color:#1769c2; text-decoration:none; white-space:nowrap; }
  .alert-action:hover { text-decoration:underline; }
  .alert-empty { text-align:center; color:#94a3b8; padding:30px 0; font-size:14px; }

  .quick-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .quick-btn { display:flex; flex-direction:column; align-items:center; justify-content:center;
               gap:10px; padding:24px 12px; border:1px solid #e8edf5; border-radius:10px;
               background:#fff; cursor:pointer; text-decoration:none; transition:all .2s; }
  .quick-btn:hover { background:#f0f6ff; border-color:#1769c2; box-shadow:0 4px 12px rgba(23,105,194,.1); }
  .quick-btn .quick-icon { font-size:28px; }
  .quick-btn .quick-label { font-size:14px; color:#172033; font-weight:500; }
  .quick-btn .quick-desc { font-size:12px; color:#94a3b8; }

  @media (max-width:900px) {
    .kpi-grid { grid-template-columns:repeat(2,1fr); }
    .dashboard-grid { grid-template-columns:1fr; }
    .quick-grid { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>ICU 质控管理平台</h1>
    <p>重症质量管理与决策支持</p>
  </div>
  <nav>
    <a href="/index.html" class="active">首页</a>
    <div class="nav-dropdown">
      <a class="nav-dropbtn">质控报表 ▾</a>
      <div class="nav-dropdown-content">
        <a href="/prone.html">俯卧位质控</a>
        <a href="/drug.html">微泵药统计</a>
      </div>
    </div>
  </nav>
</header>

<section class="card">
  <div class="welcome">
    <div class="welcome-left">
      <h2>欢迎使用 ICU 质控管理平台</h2>
      <p>重症质量管理与决策支持系统，实时监控俯卧位治疗、微泵用药等关键质控指标</p>
    </div>
    <div class="welcome-right">
      <div class="datetime" id="currentDatetime">--</div>
      <div class="admitted">当前在科患者：<strong id="admittedCount">--</strong> 人</div>
    </div>
  </div>
</section>

<section class="card">
  <h2>实时概览</h2>
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card kpi-blue" onclick="navTo('/prone.html')">
      <div class="kpi-icon">🛏️</div>
      <div class="kpi-label">进行中俯卧位</div>
      <div class="kpi-value" id="kpiActiveProne">--</div>
      <div class="kpi-unit">例</div>
    </div>
    <div class="kpi-card kpi-green" onclick="navTo('/drug.html')">
      <div class="kpi-icon">💊</div>
      <div class="kpi-label">今日微泵记录</div>
      <div class="kpi-value" id="kpiTodayDrug">--</div>
      <div class="kpi-unit">条</div>
    </div>
    <div class="kpi-card kpi-orange" onclick="navTo('/prone.html')">
      <div class="kpi-icon">⚠️</div>
      <div class="kpi-label">本月异常事件</div>
      <div class="kpi-value" id="kpiMonthAbnormal">--</div>
      <div class="kpi-unit">例</div>
    </div>
    <div class="kpi-card kpi-purple" onclick="navTo('/prone.html')">
      <div class="kpi-icon">🔄</div>
      <div class="kpi-label">本月俯卧位例次</div>
      <div class="kpi-value" id="kpiMonthProne">--</div>
      <div class="kpi-unit">例</div>
    </div>
  </div>
</section>

<div class="dashboard-grid">
  <section class="card">
    <h2>最近 24h 异常事件</h2>
    <div id="alertList"><div class="alert-empty">加载中...</div></div>
  </section>

  <section class="card">
    <h2>快速入口</h2>
    <div class="quick-grid">
      <a class="quick-btn" id="linkProne" href="/prone.html">
        <span class="quick-icon">🛏️</span>
        <span class="quick-label">俯卧位质控</span>
        <span class="quick-desc">治疗监控与报表</span>
      </a>
      <a class="quick-btn" id="linkDrug" href="/drug.html">
        <span class="quick-icon">💊</span>
        <span class="quick-label">微泵统计</span>
        <span class="quick-desc">用药时长分析</span>
      </a>
      <a class="quick-btn" id="linkPatients" href="/drug.html">
        <span class="quick-icon">👥</span>
        <span class="quick-label">患者列表</span>
        <span class="quick-desc">在科患者查询</span>
      </a>
      <a class="quick-btn" href="#" onclick="exportQuick(event)">
        <span class="quick-icon">📊</span>
        <span class="quick-label">数据导出</span>
        <span class="quick-desc">Excel 报表下载</span>
      </a>
    </div>
  </section>
</div>

<script>
const API = "/api/dashboard";
const urlParams = new URLSearchParams(location.search);
const urlDeptCode = urlParams.get("deptCode") || "";
const urlPid = urlParams.get("pid") || urlParams.get("hisPid") || "";
const apiSuffix = urlDeptCode ? "?deptCode=" + encodeURIComponent(urlDeptCode) : "";
const fullSuffix = (function() {
  var parts = [];
  if (urlDeptCode) parts.push("deptCode=" + encodeURIComponent(urlDeptCode));
  if (urlPid) { parts.push("pid=" + encodeURIComponent(urlPid)); parts.push("hisPid=" + encodeURIComponent(urlPid)); }
  return parts.length ? "?" + parts.join("&") : "";
})();

// 跳转时携带当前 URL 参数
function navTo(page) {
  var parts = [];
  if (urlDeptCode) parts.push("deptCode=" + encodeURIComponent(urlDeptCode));
  if (urlPid) {
    parts.push("pid=" + encodeURIComponent(urlPid));
    parts.push("hisPid=" + encodeURIComponent(urlPid));
  }
  location.href = page + (parts.length ? "?" + parts.join("&") : "");
}

// 更新时钟
function updateClock() {
  const now = new Date();
  const str = now.toLocaleString("zh-CN", {
    year: "numeric", month: "2-digit", day: "2-digit",
    weekday: "long", hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
  document.getElementById("currentDatetime").textContent = str;
}
setInterval(updateClock, 1000);
updateClock();

// 加载 KPI 数据
async function loadSummary() {
  try {
    const r = await fetch(`${API}/summary${apiSuffix}`);
    const d = await r.json();
    if (d.code !== 0) return;
    const s = d.data;
    document.getElementById("admittedCount").textContent = s.admittedCount;
    document.getElementById("kpiActiveProne").textContent = s.activeProneCount;
    document.getElementById("kpiTodayDrug").textContent = s.todayDrugCount;
    document.getElementById("kpiMonthAbnormal").textContent = s.monthAbnormalCount;
    document.getElementById("kpiMonthProne").textContent = s.monthProneCount;
  } catch (e) {
    console.error("加载概览数据失败:", e);
  }
}

// 加载异常事件
async function loadAlerts() {
  try {
    const r = await fetch(`${API}/alerts${apiSuffix}`);
    const d = await r.json();
    const container = document.getElementById("alertList");
    if (d.code !== 0 || !d.data || d.data.length === 0) {
      container.innerHTML = '<div class="alert-empty">✅ 最近 24h 无异常事件</div>';
      return;
    }
    container.innerHTML = d.data.map(a => `
      <div class="alert-row">
        <div class="alert-dot"></div>
        <div class="alert-info">
          <div class="alert-title">${a.bed || '-'}床 ${a.patientName || '-'}</div>
          <div class="alert-desc">俯卧位未闭合超时 ${a.unclosedHours}h（开始于 ${formatTime(a.startTime)}）</div>
        </div>
        <a class="alert-action" href="/prone.html${fullSuffix}">处理</a>
      </div>
    `).join("");
  } catch (e) {
    console.error("加载异常事件失败:", e);
    document.getElementById("alertList").innerHTML = '<div class="alert-empty">加载失败</div>';
  }
}

function formatTime(iso) {
  if (!iso) return "-";
  return new Date(iso).toLocaleString("zh-CN", {
    month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
  });
}

function exportQuick(e) {
  e.preventDefault();
  let url = "/api/prone/export?startDate=" + getDate(-30) + "&endDate=" + getDate(0);
  if (urlDeptCode) url += "&deptCode=" + encodeURIComponent(urlDeptCode);
  window.open(url, "_blank");
}

function getDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().substring(0, 10);
}

// 快速入口链接携带参数（患者列表只带 deptCode）
if (fullSuffix) {
  document.getElementById("linkProne").href = "/prone.html" + fullSuffix;
  document.getElementById("linkDrug").href = "/drug.html" + fullSuffix;
}
if (urlDeptCode) {
  document.getElementById("linkPatients").href = "/drug.html?deptCode=" + encodeURIComponent(urlDeptCode);
}

loadSummary();
loadAlerts();
</script>
<script src="js/nav.js"></script>
</body>
</html>
