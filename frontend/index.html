<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>ICU 微泵/氧疗时长统计</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
<header>
  <div>
    <h1>ICU 时长统计平台</h1>
    <p id="subtitle">微泵与氧疗时长追踪</p>
  </div>
</header>

<section class="card filter">
  <input id="kw" placeholder="搜索 姓名/mrn" />
  <label>开始: <input type="date" id="startDate" /></label>
  <label>结束: <input type="date" id="endDate" /></label>
  <button onclick="applyFilter()">查询</button>
  <button onclick="exportExcel()" class="btn-export">⬇ 导出 Excel</button>
</section>

<section class="patient-overview" id="patientOverview" style="display:none">
  <div class="overview-main">
    <div class="avatar" id="patientAvatar">--</div>
    <div>
      <h2 id="patientName">--</h2>
      <div class="overview-meta" id="patientMeta"></div>
    </div>
  </div>
  <div class="metric">
    <span>微泵总时长</span>
    <strong id="metricDrug">--</strong>
  </div>
  <div class="metric">
    <span>氧疗总时长</span>
    <strong id="metricOxy">--</strong>
  </div>
  <div class="metric">
    <span>统计范围</span>
    <strong id="metricRange">--</strong>
  </div>
</section>

<section class="card detail-table" id="drugRecordsSection" style="display:none">
  <div class="section-title">
    <h2>每日每种微泵药时长</h2>
    <span id="drugRecordCount"></span>
  </div>
  <table id="tblDrugRecords">
    <thead><tr>
      <th>日期</th><th>药品</th><th>时长(小时)</th><th>记录数</th><th>操作</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</section>

<section class="card detail-table" id="oxygenRecordsSection" style="display:none">
  <div class="section-title">
    <h2>每日氧疗时长</h2>
    <span id="oxygenRecordCount"></span>
  </div>
  <table id="tblOxygenRecords">
    <thead><tr>
      <th>日期</th><th>氧疗途径</th><th>时长(小时)</th><th>记录数</th><th>操作</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</section>

<section class="card" id="patientListSection">
  <h2>病人列表</h2>
  <table id="tbl">
    <thead><tr>
      <th>姓名</th><th>性别</th><th>科室</th><th>床号</th>
      <th>主治</th><th>入院诊断</th><th>入院时间</th><th>操作</th>
    </tr></thead>
    <tbody></tbody>
  </table>
  <div class="pager">
    <button onclick="prev()">上一页</button>
    <span id="pageInfo"></span>
    <button onclick="next()">下一页</button>
  </div>
</section>

<script src="js/list.js"></script>
</body>
</html>
